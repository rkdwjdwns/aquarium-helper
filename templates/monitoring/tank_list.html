{% extends 'base.html' %}

{% block content %}
<div class="py-8" x-data="{ selectedTanks: [] }">
    <div class="flex justify-between items-end mb-8 px-4">
        <div>
            <h2 class="text-3xl font-black text-gray-800 tracking-tight">⚙️ 어항 편집센터</h2>
            <p class="text-slate-400 font-bold text-sm mt-1">어항을 추가하거나 삭제, 수정하세요.</p>
        </div>
        <div class="flex gap-2">
            <button @click="if(selectedTanks.length > 0 && confirm('정말 삭제하시겠습니까?')) document.getElementById('delete-form').submit()"
                    :class="selectedTanks.length > 0 ? 'bg-red-500 text-white shadow-lg' : 'bg-slate-100 text-slate-300 cursor-not-allowed'"
                    class="px-5 py-3 rounded-2xl font-black text-xs transition-all"
                    :disabled="selectedTanks.length === 0">
                선택 삭제 <span x-show="selectedTanks.length > 0" x-text="selectedTanks.length"></span>
            </button>
            <a href="{% url 'monitoring:add_tank' %}" class="bg-blue-600 text-white px-5 py-3 rounded-2xl font-black shadow-lg text-xs hover:bg-blue-700 transition-all">
                + 어항 추가
            </a>
        </div>
    </div>

    <form id="delete-form" action="{% url 'monitoring:delete_tanks' %}" method="POST" class="hidden">
        {% csrf_token %}
        <template x-for="id in selectedTanks" :key="id">
            <input type="hidden" name="tank_ids" :value="id">
        </template>
    </form>

    <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-100 mx-4">
        <table class="w-full text-left">
            <thead class="bg-slate-50 border-b border-slate-100">
                <tr>
                    <th class="p-6 w-16 text-center">
                        <input type="checkbox" @change="if($el.checked) { selectedTanks = [{% for tank in tanks %}'{{ tank.id }}',{% endfor %}] } else { selectedTanks = [] }" class="w-5 h-5 rounded-lg border-slate-300">
                    </th>
                    <th class="p-6 font-black text-slate-500 text-sm">어항 이름</th>
                    <th class="p-6 font-black text-slate-500 text-sm">어종</th>
                    <th class="p-6 font-black text-slate-500 text-sm text-center">관리</th>
                </tr>
            </thead>
            <tbody>
                {% for tank in tanks %}
                <tr class="border-b border-slate-50 hover:bg-blue-50/30 transition-colors">
                    <td class="p-6 text-center">
                        <input type="checkbox" value="{{ tank.id }}" x-model="selectedTanks" class="w-5 h-5 rounded-lg border-slate-300 text-blue-600">
                    </td>
                    <td class="p-6 font-bold text-gray-800">{{ tank.name }}</td>
                    <td class="p-6 text-slate-500 font-medium">{{ tank.fish_species|default:"-" }}</td>
                    <td class="p-6 text-center">
                        <div class="flex justify-center gap-2">
                            <a href="{% url 'monitoring:edit_tank' tank.id %}" class="bg-slate-100 text-slate-600 px-4 py-2 rounded-xl font-black text-xs hover:bg-slate-200 transition-all">수정</a>
                            <a href="{% url 'monitoring:delete_tank' tank.id %}" onclick="return confirm('이 어항을 삭제할까요?')" class="bg-red-50 text-red-500 px-4 py-2 rounded-xl font-black text-xs hover:bg-red-100 transition-all">삭제</a>
                        </div>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="p-20 text-center">
                        <div class="text-5xl mb-4">🐠</div>
                        <p class="text-slate-400 font-bold text-lg">등록된 어항이 없습니다.</p>
                        <p class="text-slate-300 text-sm mt-1">새 어항을 추가하여 모니터링을 시작해보세요!</p>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="ko" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fish Manager - 어항 도우미</title>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        body { font-family: "Pretendard", sans-serif; background-color: #F8FAFC; }
        [x-cloak] { display: none !important; }
        .active-stable:active { transform: scale(0.98); }
        #chatbot-sidebar { 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(15px); background-color: rgba(255, 255, 255, 0.95);
            width: 380px; height: 600px; position: fixed; bottom: 100px; right: 30px;
            border-radius: 2.5rem; border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15); z-index: 70;
        }
        @media (max-width: 768px) { #chatbot-sidebar { width: 100%; height: 80vh; right: 0; bottom: 0; border-radius: 2.5rem 2.5rem 0 0; } }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
            <a href="/" class="text-xl font-bold text-blue-600">🐠 어항 도우미</a>
            <div class="flex items-center gap-4">
                {% if user.is_authenticated %}
                <span class="text-sm font-bold">{{ user.nickname|default:user.username }}님</span>
                <form action="{% url 'accounts:logout' %}" method="post">{% csrf_token %}<button type="submit" class="text-xs text-red-500 font-bold">로그아웃</button></form>
                {% else %}
                <a href="{% url 'accounts:login' %}" class="text-sm font-bold">로그인</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-10 max-w-6xl">
        {% block content %}{% endblock %}
    </main>

    <button onclick="toggleChat()" class="fixed bottom-8 right-8 w-16 h-16 bg-blue-600 rounded-full shadow-2xl flex items-center justify-center text-3xl z-[45] hover:scale-110 transition-all border-4 border-white">🤖</button>
    
    <div id="chatbot-sidebar" style="transform: translateX(150%);" class="flex flex-col">
        <div class="p-6 bg-gradient-to-r from-blue-600 to-cyan-500 flex justify-between items-center text-white rounded-t-[2.5rem]">
            <div><h2 class="font-black text-sm">어항 도우미 AI</h2><p class="text-[10px] opacity-80">실시간 수질 분석</p></div>
            <button onclick="toggleChat()" class="text-3xl">&times;</button>
        </div>
        
        <div id="side-chat-window" class="flex-1 overflow-y-auto p-5 space-y-4 bg-[#F8FBFF] scroll-smooth">
            <div class="bg-blue-100 text-blue-700 p-4 rounded-2xl rounded-tl-none text-sm font-bold shadow-sm inline-block max-w-[80%]">
                안녕하세요 {{ user.nickname|default:user.username }}님! 🌊 무엇을 도와드릴까요?
            </div>
        </div>

        <div class="p-4 bg-white border-t rounded-b-[2.5rem]">
            <form id="side-chat-form" class="flex gap-2">
                {% csrf_token %}
                <input type="text" id="side-user-input" class="flex-1 bg-slate-50 border-none rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-blue-400" placeholder="질문을 입력하세요...">
                <button type="submit" class="bg-blue-600 text-white px-5 py-3 rounded-xl text-xs font-black active-stable">전송</button>
            </form>
        </div>
    </div>

    <script>
        function toggleChat() {
            const sidebar = document.getElementById('chatbot-sidebar');
            const isClosed = sidebar.style.transform === 'translateX(150%)';
            sidebar.style.transform = isClosed ? 'translateX(0px)' : 'translateX(150%)';
        }

        document.getElementById('side-chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('side-user-input');
            const message = input.value.trim();
            if (!message) return;

            const chatWin = document.getElementById('side-chat-window');
            chatWin.innerHTML += `<div class="flex justify-end mb-2"><div class="bg-blue-600 text-white p-4 rounded-2xl rounded-tr-none text-sm font-bold shadow-md inline-block max-w-[80%]">${message}</div></div>`;
            input.value = '';
            chatWin.scrollTop = chatWin.scrollHeight;

            const loadingId = 'loading-' + Date.now();
            chatWin.innerHTML += `<div id="${loadingId}" class="bg-slate-200 text-slate-500 p-3 rounded-2xl rounded-tl-none text-xs font-bold animate-pulse">분석 중...</div>`;
            chatWin.scrollTop = chatWin.scrollHeight;

            try {
                const response = await fetch('/chatbot/ask/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                    },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                document.getElementById(loadingId).remove();
                chatWin.innerHTML += `<div class="bg-white border text-slate-700 p-4 rounded-2xl rounded-tl-none text-sm font-bold shadow-sm inline-block max-w-[80%] mb-2" style="white-space: pre-line;">${data.reply}</div>`;
            } catch (error) {
                document.getElementById(loadingId).innerText = "앗, 서버와 연결이 끊겼어요.";
            }
            chatWin.scrollTop = chatWin.scrollHeight;
        });
    </script>
</body>
</html>

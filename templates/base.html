<!DOCTYPE html>
<html lang="ko" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fish Manager - 어항 도우미</title>
    
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    
    <style>
        body { 
            font-family: "Pretendard", sans-serif; 
            -webkit-font-smoothing: antialiased;
            background-color: #F8FAFC; 
            margin: 0;
            padding: 0;
        }
        [x-cloak] { display: none !important; }
        .active-stable:active { transform: scale(0.98); transition: transform 0.1s; }
        
        #chatbot-sidebar { 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(15px); 
            background-color: rgba(255, 255, 255, 0.95);
            width: 380px; 
            height: 600px; 
            position: fixed; 
            bottom: 100px; 
            right: 30px;
            border-radius: 2.5rem; 
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15); 
            display: flex; 
            flex-direction: column; 
            z-index: 70;
        }
        @media (max-width: 768px) { 
            #chatbot-sidebar { width: 100%; height: 80vh; right: 0; bottom: 0; border-radius: 2.5rem 2.5rem 0 0; }
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
            <a href="{% url 'monitoring:index' %}" class="text-xl font-bold text-blue-600 tracking-tighter active-stable">
                🐠 어항 도우미
            </a>

            <div class="flex items-center space-x-4">
                {% if user.is_authenticated %}
                <div class="relative" x-data="{ open: false }">
                    <button @click="open = !open" @click.away="open = false" class="text-sm font-bold text-slate-700 flex items-center gap-1 outline-none">
                        {{ user.nickname|default:user.username }}님
                        <svg class="w-4 h-4 transition-transform" :class="open ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
                        </svg>
                    </button>
                    <div x-show="open" x-cloak x-transition class="absolute right-0 mt-2 w-40 bg-white border border-slate-100 rounded-2xl shadow-xl py-2 z-50">
                        <a href="{% url 'accounts:profile' %}" class="block px-4 py-2 text-sm text-slate-600 hover:bg-blue-50 font-bold">내 정보</a>
                        <div class="border-t border-slate-50 my-1"></div>
                        <form action="{% url 'accounts:logout' %}" method="post" class="m-0">
                            {% csrf_token %}
                            <button type="submit" class="w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-red-50 font-bold">로그아웃</button>
                        </form>
                    </div>
                </div>
                {% else %}
                <div class="flex gap-2">
                    <a href="{% url 'accounts:login' %}" class="text-sm font-bold text-slate-600 hover:text-blue-600 px-2 py-1 transition-colors">로그인</a>
                    <a href="{% url 'accounts:signup' %}" class="text-sm font-bold bg-blue-600 text-white px-3 py-1 rounded-lg hover:bg-blue-700 transition-colors">회원가입</a>
                </div>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="flex-grow container mx-auto px-4 py-10 max-w-6xl">
        {% block content %}{% endblock %}
    </main>

    <button onclick="toggleChat()" class="fixed bottom-8 right-8 w-16 h-16 bg-gradient-to-tr from-blue-600 to-cyan-400 rounded-full shadow-2xl flex items-center justify-center text-3xl z-[45] hover:scale-110 active-stable transition-all border-4 border-white">🤖</button>
    
    <div id="chatbot-sidebar" style="transform: translateX(150%);">
        <div class="p-6 bg-gradient-to-r from-blue-600 to-cyan-500 flex justify-between items-center text-white shrink-0 rounded-t-[2.5rem]">
            <div>
                <h2 class="font-black text-sm tracking-tight uppercase">어항 도우미 AI</h2>
                <p class="text-[10px] opacity-80 font-bold">실시간 수질 분석 및 상담</p>
            </div>
            <button onclick="toggleChat()" class="text-white/80 hover:text-white text-3xl">&times;</button>
        </div>
        
        <div id="side-chat-window" class="flex-1 overflow-y-auto p-5 space-y-4 bg-[#F8FBFF] no-scrollbar">
            <div class="bg-blue-100 text-blue-700 p-4 rounded-2xl rounded-tl-none text-sm font-bold shadow-sm inline-block max-w-[80%] mb-2">
                안녕하세요 {{ user.nickname|default:user.username }}님! 🌊<br>궁금한 점이 있다면 물어봐 주세요.
            </div>
        </div>

        <div class="p-4 bg-white border-t border-slate-100 rounded-b-[2.5rem]">
            <form id="side-chat-form" class="flex gap-2">
                {% csrf_token %}
                <input type="text" id="side-user-input" class="flex-1 bg-slate-50 border-none rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-400 outline-none" placeholder="질문을 입력하세요...">
                <button type="submit" class="bg-blue-600 text-white px-5 py-3 rounded-xl text-xs font-black shadow-md active-stable">전송</button>
            </form>
        </div>
    </div>

    <script>
        function toggleChat() {
            const sidebar = document.getElementById('chatbot-sidebar');
            const isClosed = sidebar.style.transform === 'translateX(150%)';
            sidebar.style.transform = isClosed ? 'translateX(0px)' : 'translateX(150%)';
        }

        document.getElementById('side-chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('side-user-input');
            const message = input.value.trim();
            if (!message) return;

            const chatWin = document.getElementById('side-chat-window');
            
            chatWin.innerHTML += `<div class="flex justify-end mb-2"><div class="bg-blue-600 text-white p-4 rounded-2xl rounded-tr-none text-sm font-bold shadow-md inline-block max-w-[80%]">${message}</div></div>`;
            input.value = '';
            chatWin.scrollTop = chatWin.scrollHeight;

            const loadingId = 'loading-' + Date.now();
            chatWin.innerHTML += `<div id="${loadingId}" class="bg-slate-200 text-slate-500 p-3 rounded-2xl rounded-tl-none text-xs font-bold inline-block animate-pulse mb-2">분석 중...</div>`;
            chatWin.scrollTop = chatWin.scrollHeight;

            try {
                // [수정] 챗봇 앱의 URL로 정확히 요청
                const response = await fetch('/chatbot/ask/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                    },
                    body: JSON.stringify({ message: message })
                });
                
                const data = await response.json();
                const loadingElem = document.getElementById(loadingId);
                if (loadingElem) loadingElem.remove();

                const botReply = data.reply || data.message || "답변을 가져오지 못했습니다.";

                chatWin.innerHTML += `<div class="bg-white border border-slate-100 text-slate-700 p-4 rounded-2xl rounded-tl-none text-sm font-bold shadow-sm inline-block max-w-[80%] mb-2">${botReply}</div>`;
            } catch (error) {
                const loadingElem = document.getElementById(loadingId);
                if (loadingElem) loadingElem.innerText = "앗, 서버와 연결이 끊겼어요.";
            }
            chatWin.scrollTop = chatWin.scrollHeight;
        });
    </script>
</body>
</html>
